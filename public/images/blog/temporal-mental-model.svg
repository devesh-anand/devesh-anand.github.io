<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 450" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace">

  <!-- Background -->
  <rect width="860" height="450" fill="#0d1117" rx="12"/>

  <!-- Temporal Server box -->
  <rect x="60" y="30" width="740" height="80" fill="#161b22" stroke="#30363d" stroke-width="1.5" rx="8"/>
  <text x="430" y="62" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Temporal Server</text>
  <text x="430" y="84" text-anchor="middle" fill="#8b949e" font-size="12">persists event history · manages task queues · coordinates workers</text>

  <!-- Arrow: Server down to Worker -->
  <line x1="430" y1="110" x2="430" y2="165" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="430,169 424,157 436,157" fill="#30363d"/>
  <text x="445" y="143" fill="#8b949e" font-size="11">dispatches tasks</text>

  <!-- Worker box -->
  <rect x="210" y="169" width="440" height="74" fill="#161b22" stroke="#388bfd" stroke-width="1.5" rx="8"/>
  <text x="430" y="194" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Worker</text>
  <text x="430" y="213" text-anchor="middle" fill="#8b949e" font-size="12">polls task queues</text>
  <text x="430" y="230" text-anchor="middle" fill="#8b949e" font-size="12">executes workflows &amp; activities</text>

  <!-- Arrow: Worker left to Workflow -->
  <line x1="210" y1="206" x2="152" y2="272" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="148,276 147,263 159,267" fill="#30363d"/>

  <!-- Arrow: Worker right to Activity -->
  <line x1="650" y1="206" x2="708" y2="272" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="712,276 701,267 713,263" fill="#30363d"/>

  <!-- Workflow box -->
  <rect x="50" y="276" width="260" height="112" fill="#161b22" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="180" y="304" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Workflow</text>
  <text x="180" y="323" text-anchor="middle" fill="#8b949e" font-size="11">orchestrates steps</text>
  <text x="180" y="341" text-anchor="middle" fill="#8b949e" font-size="11">no side effects</text>
  <text x="180" y="362" text-anchor="middle" fill="#d2a8ff" font-size="11" font-style="italic">must be deterministic</text>

  <!-- Arrow: Workflow schedules Activities -->
  <line x1="310" y1="332" x2="500" y2="332" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="504,332 492,326 492,338" fill="#30363d"/>
  <text x="407" y="325" text-anchor="middle" fill="#8b949e" font-size="11">schedules</text>

  <!-- Activity box -->
  <rect x="550" y="276" width="260" height="112" fill="#161b22" stroke="#f78166" stroke-width="1.5" rx="8"/>
  <text x="680" y="304" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Activity</text>
  <text x="680" y="323" text-anchor="middle" fill="#8b949e" font-size="11">API calls · DB writes</text>
  <text x="680" y="341" text-anchor="middle" fill="#8b949e" font-size="11">external side effects</text>
  <text x="680" y="362" text-anchor="middle" fill="#d2a8ff" font-size="11" font-style="italic">can be non-deterministic</text>

  <!-- Left return arrow: Workflow → Temporal Server -->
  <path d="M 50 332 Q 22 220 60 110" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="60,110 54,122 66,122" fill="#30363d"/>
  <text x="34" y="228" text-anchor="middle" fill="#8b949e" font-size="11" transform="rotate(90,34,228)">replayed on resume</text>

  <!-- Right return arrow: Activity → Temporal Server -->
  <path d="M 810 332 Q 838 220 800 110" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="800,110 794,122 806,122" fill="#30363d"/>
  <text x="826" y="228" text-anchor="middle" fill="#8b949e" font-size="11" transform="rotate(90,826,228)">result stored in history</text>

  <!-- Legend -->
  <line x1="50" y1="420" x2="72" y2="420" stroke="#3fb950" stroke-width="2"/>
  <text x="78" y="424" fill="#8b949e" font-size="11">Workflow</text>
  <line x1="175" y1="420" x2="197" y2="420" stroke="#f78166" stroke-width="2"/>
  <text x="203" y="424" fill="#8b949e" font-size="11">Activity</text>
  <line x1="285" y1="420" x2="307" y2="420" stroke="#388bfd" stroke-width="2"/>
  <text x="313" y="424" fill="#8b949e" font-size="11">Worker</text>
  <line x1="385" y1="420" x2="407" y2="420" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="413" y="424" fill="#8b949e" font-size="11">data / control flow</text>

</svg>
